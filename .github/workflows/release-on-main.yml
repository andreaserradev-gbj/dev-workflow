name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read marketplace version
        id: version
        run: |
          version=$(node -e "const m=require('./.claude-plugin/marketplace.json'); process.stdout.write(m.plugins[0].version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract local release notes
        if: steps.existing.outputs.exists == 'false'
        run: |
          node scripts/extract-local-release-notes.mjs "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Create GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
