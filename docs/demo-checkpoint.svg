<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#16172b"/>
    </linearGradient>
    <linearGradient id="term" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1f35"/>
      <stop offset="100%" style="stop-color:#191a30"/>
    </linearGradient>
  </defs>

  <rect width="520" height="260" rx="12" fill="url(#bg)"/>

  <g transform="translate(20, 16)">
    <rect width="480" height="228" rx="10" fill="url(#term)" stroke="#2d2e4a" stroke-width="1"/>
    <rect width="480" height="32" rx="10" fill="#252640"/>
    <rect y="22" width="480" height="10" fill="#252640"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="16" r="5" fill="#febc2e"/>
    <circle cx="52" cy="16" r="5" fill="#28c840"/>
    <text x="240" y="20" fill="#6b6d8a" font-size="11" text-anchor="middle">Context getting heavy — time to save progress</text>

    <g transform="translate(16, 48)" font-size="11.5">
      <text y="0" fill="#7aa2f7">&#x276F;</text>
      <text x="14" y="0" fill="#c0caf5">/dev-checkpoint</text>

      <text y="32" fill="#9ece6a">&#x2713; Checkpoint saved</text>

      <text y="62" fill="#e0af68" font-weight="bold">Completed:</text>
      <text x="92" y="62" fill="#c0c2d6">All 5 Phase 1 steps &#x2014; removed</text>
      <text x="14" y="80" fill="#c0c2d6">deprecated fields, updated auth enum, renamed paths.</text>
      <text y="106" fill="#e0af68" font-weight="bold">Blockers:</text>
      <text x="78" y="106" fill="#c0c2d6">Tests fail until Phase 2 updates fixtures.</text>
      <text y="132" fill="#e0af68" font-weight="bold">Notes:</text>
      <text x="56" y="132" fill="#c0c2d6">PRD line numbers were slightly off from actual</text>
      <text x="14" y="150" fill="#c0c2d6">code. Edits were made at the correct locations.</text>
      <text y="172" fill="#565873">Session closed. Everything important is on disk.</text>
    </g>
