<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#16172b"/>
    </linearGradient>
    <linearGradient id="term" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1f35"/>
      <stop offset="100%" style="stop-color:#191a30"/>
    </linearGradient>
  </defs>

  <rect width="520" height="340" rx="12" fill="url(#bg)"/>

  <g transform="translate(20, 16)">
    <rect width="480" height="308" rx="10" fill="url(#term)" stroke="#2d2e4a" stroke-width="1"/>
    <rect width="480" height="32" rx="10" fill="#252640"/>
    <rect y="22" width="480" height="10" fill="#252640"/>
    <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
