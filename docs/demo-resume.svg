      <text x="6" y="200" fill="#9ece6a" font-weight="bold">Start with:</text>
      <text x="104" y="200" fill="#9ece6a">Write migration script for the 4</text>
      <text x="6" y="216" fill="#9ece6a">userAuth*.json test fixtures, then update mocks.</text>

      <text y="248" fill="#c0c2d6">Ready to proceed?</text>
