    <text x="240" y="20" fill="#6b6d8a" font-size="11" text-anchor="middle">Next day — picking up where you left off</text>

    <g transform="translate(16, 48)" font-size="11.5">
      <text y="0" fill="#7aa2f7">&#x276F;</text>
      <text x="14" y="0" fill="#c0caf5">/dev-resume user-auth-migration</text>

      <text y="32" fill="#7aa2f7" font-weight="bold">Status:</text>
