<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Dashboard — Offline</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          'Outfit',
          system-ui,
          -apple-system,
          sans-serif;
        background: #060b18;
        background-image: radial-gradient(
          ellipse at top center,
          rgba(56, 189, 248, 0.03) 0%,
          transparent 50%
        );
        color: #cbd5e1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        opacity: 0.5;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 1.25rem;
        color: #94a3b8;
      }
      code {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        background: rgba(56, 189, 248, 0.08);
        border: 1px solid rgba(56, 189, 248, 0.15);
        border-radius: 6px;
        padding: 0.2em 0.5em;
        font-size: 0.85rem;
        color: #38bdf8;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: #64748b;
        margin-top: 1.5rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f87171;
        transition: background 0.3s;
      }
      .dot.connected {
        background: #4ade80;
      }
      .status.reconnecting .dot {
        animation: pulse 1.5s ease-in-out infinite;
        background: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="icon" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="96" fill="#1e293b" />
        <path
          d="M128 192L208 256L128 320"
          stroke="#475569"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <line
          x1="240"
          y1="320"
          x2="384"
          y2="320"
          stroke="#475569"
          stroke-width="32"
          stroke-linecap="round"
        />
        <circle cx="176" cy="120" r="16" fill="#334155" />
        <circle cx="224" cy="120" r="16" fill="#334155" />
        <circle cx="272" cy="120" r="16" fill="#334155" />
      </svg>
      <h1>Dashboard server isn't running</h1>
      <p>Start it from your terminal:</p>
      <p><code>dev-dashboard</code></p>
      <p id="hint" style="font-size: 0.85rem; color: #64748b; margin-top: 0.5rem">
        This page will reconnect automatically.
      </p>
      <div class="status reconnecting" id="status">
        <span class="dot" id="dot"></span>
        <span id="statusText">Waiting for server…</span>
      </div>
    </div>
    <script>
      (function () {
        const dot = document.getElementById('dot');
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        let delay = 2000;

        function check() {
          fetch('/api/health', { cache: 'no-store' })
            .then((r) => {
              if (r.ok) return r.json();
              throw new Error();
            })
            .then(() => {
              dot.classList.add('connected');
              statusEl.classList.remove('reconnecting');
              statusText.textContent = 'Connected — reloading…';
              setTimeout(() => window.location.replace('/'), 300);
            })
            .catch(() => {
              delay = Math.min(delay * 1.2, 10000);
              setTimeout(check, delay);
            });
        }

        // Start checking after a short initial delay
        setTimeout(check, 1500);
      })();
    </script>
  </body>
</html>
