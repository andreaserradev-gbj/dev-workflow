<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Terminal prompt -->
  <path d="M128 192 L208 256 L128 320" fill="none" stroke="url(#accent)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor/lines -->
  <line x1="240" y1="320" x2="384" y2="320" stroke="url(#accent)" stroke-width="32" stroke-linecap="round"/>
  <!-- Status dots -->
  <circle cx="176" cy="120" r="16" fill="#f87171"/>
  <circle cx="224" cy="120" r="16" fill="#fbbf24"/>
  <circle cx="272" cy="120" r="16" fill="#4ade80"/>
</svg>
