<body class="text-slate-200 font-sans min-h-screen antialiased">
    <div id="app"></div>

    <script>
        /* ── Status configuration ── */

        const STATUS = {
            active: {
                label: 'Active',
                badge: 'bg-sky-500/10 text-sky-400 ring-1 ring-inset ring-sky-500/20',
                bar: 'bg-sky-500',
                dot: 'bg-sky-400',
                color: '#0ea5e9',
                accent: 'text-sky-400',
            },
            gate: {
                label: 'Gate',
                badge: 'bg-amber-500/10 text-amber-400 ring-1 ring-inset ring-amber-500/20',
                bar: 'bg-amber-500',
                dot: 'bg-amber-400',
                color: '#f59e0b',
                accent: 'text-amber-400',
            },
            complete: {
                label: 'Complete',
                badge: 'bg-emerald-500/10 text-emerald-400 ring-1 ring-inset ring-emerald-500/20',
                bar: 'bg-emerald-500',
                dot: 'bg-emerald-400',
                color: '#10b981',
                accent: 'text-emerald-400',
            },
            stale: {
                label: 'Stale',
                badge: 'bg-red-500/10 text-red-400 ring-1 ring-inset ring-red-500/20',
                bar: 'bg-red-500',
                dot: 'bg-red-400',
                color: '#ef4444',
                accent: 'text-red-400',
            },
            'no-prd': {
                label: 'No PRD',
                badge: 'bg-slate-500/10 text-slate-400 ring-1 ring-inset ring-slate-500/20',
                bar: 'bg-slate-600',
                dot: 'bg-slate-500',
                color: '#64748b',
                accent: 'text-slate-400',
            },
        };

        const PHASE_STATUS = {
            'complete': { dot: 'bg-emerald-400', bar: 'bg-emerald-500' },
            'in-progress': { dot: 'bg-sky-400', bar: 'bg-sky-500' },
            'not-started': { dot: 'bg-slate-600', bar: 'bg-slate-700' },
        };

        const STATUS_ORDER = { gate: 0, active: 1, stale: 2, 'no-prd': 3, complete: 4 };

        let selectedFeature = null;
        let sortedFeatures = [];

        /* ── Helpers ── */

        function esc(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function getStatus(key) {
            return STATUS[key] || STATUS['no-prd'];
        }

        function getPhaseStatus(key) {
            return PHASE_STATUS[key] || PHASE_STATUS['not-started'];
        }

        function pct(done, total) {
            return total > 0 ? Math.round((done / total) * 100) : 0;
        }

        function formatDate(str) {
            if (!str) return '\u2014';
            const d = new Date(str);
            if (isNaN(d)) return str;
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTimestamp(str) {
            if (!str) return '';
            const d = new Date(str);
            if (isNaN(d)) return str;
            return d.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit'
            });
        }

        function chevronSvg() {
            return `<svg class="chevron w-3.5 h-3.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>`;
        }

        /* ── Render functions ── */

        function renderSummaryStats(summary) {
            const stats = [
                { count: summary.total, label: 'features', colorClass: 'text-white' },
                { count: summary.active, label: 'active', colorClass: 'text-sky-400' },
                { count: summary.complete, label: 'complete', colorClass: 'text-emerald-400' },
                { count: summary.stale, label: 'stale', colorClass: 'text-red-400' },
            ];
            if (summary.gate > 0) {
                stats.push({ count: summary.gate, label: 'gate', colorClass: 'text-amber-400' });
            }
            if (summary.noPrd > 0) {
                stats.push({ count: summary.noPrd, label: 'no prd', colorClass: 'text-slate-400' });
            }

            return stats.map((s, i) => `
                ${i > 0 ? '<div class="w-px h-4 bg-slate-800"></div>' : ''}
                <div class="flex items-center gap-2">
                    <span class="font-mono text-xl font-semibold ${s.colorClass}">${s.count}</span>
                    <span class="text-xs text-slate-500 uppercase tracking-wider">${s.label}</span>
                </div>
            `).join('');
        }

        function renderProgressBar(done, total, statusKey, height = 'h-1.5') {
            const p = pct(done, total);
            const s = getStatus(statusKey);
            return `
                <div class="flex items-center gap-3">
                    <div class="flex-1 ${height} bg-slate-800 rounded-full overflow-hidden" style="box-shadow: inset 0 1px 2px rgba(0,0,0,0.4)">
                        <div class="${s.bar} ${height} rounded-full transition-all duration-500" style="width: ${p}%"></div>
                    </div>
                    <div class="flex items-baseline gap-1.5 shrink-0">
                        <span class="font-mono text-xs font-medium text-slate-300 tabular-nums">${p}%</span>
                        <span class="font-mono text-[12px] text-slate-600 tabular-nums">${done}/${total}</span>
                    </div>
                </div>
            `;
        }

        function renderPhaseRow(phase) {
            const ps = getPhaseStatus(phase.status);
            const p = pct(phase.stepsDone, phase.stepsTotal);
            const isDone = phase.status === 'complete';
            return `
                <div class="flex items-center gap-2.5 py-1.5 group">
                    <div class="w-1.5 h-1.5 rounded-full ${ps.dot} shrink-0"></div>
                    <span class="font-mono text-[13px] text-slate-600 w-4 shrink-0">${phase.number}</span>
                    <span class="text-sm ${isDone ? 'text-slate-500' : 'text-slate-300'} flex-1 truncate">${esc(phase.title)}</span>
                    <div class="w-14 h-1 bg-slate-800 rounded-full overflow-hidden shrink-0">
                        <div class="${ps.bar} h-full rounded-full" style="width: ${p}%"></div>
                    </div>
                    <span class="font-mono text-[13px] text-slate-500 tabular-nums w-7 text-right shrink-0">${phase.stepsDone}/${phase.stepsTotal}</span>
                </div>
            `;
        }

        function renderPhasesList(phases, featureStatus) {
            if (!phases || phases.length === 0) return '';
            const isOpen = featureStatus !== 'complete';
            return `
                <details ${isOpen ? 'open' : ''} class="mt-3">
                    <summary class="flex items-center gap-2 py-1 hover:bg-slate-800/30 -mx-1 px-1 rounded transition-colors">
                        ${chevronSvg()}
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">${phases.length} Phase${phases.length !== 1 ? 's' : ''}</span>
                    </summary>
                    <div class="ml-1 mt-1 border-l border-slate-800/60 pl-2">
                        ${phases.map(renderPhaseRow).join('')}
                    </div>
                </details>
            `;
        }

        function renderStepRow(step) {
            const isDone = step.status === 'done';
            return `
                <div class="flex items-start gap-2 py-1 pl-1">
                    <span class="text-[13px] mt-px shrink-0 ${isDone ? 'text-emerald-500' : 'text-slate-700'}">${isDone ? '\u2713' : '\u25CB'}</span>
                    <span class="text-xs leading-relaxed ${isDone ? 'text-slate-500 line-through decoration-slate-700' : 'text-slate-400'}">${esc(step.description)}</span>
                </div>
            `;
        }

        function renderSubPrdRow(subPrd) {
            const ps = getPhaseStatus(subPrd.status);
            const p = pct(subPrd.stepsDone, subPrd.stepsTotal);
            const isDone = subPrd.status === 'complete';
            const hasSteps = subPrd.steps && subPrd.steps.length > 0;

            const headerRow = `
                <div class="flex items-center gap-2.5 py-1.5">
                    <div class="w-1.5 h-1.5 rounded-full ${ps.dot} shrink-0"></div>
                    <span class="font-mono text-[13px] text-slate-600 w-4 shrink-0">${subPrd.id}</span>
                    <span class="text-sm ${isDone ? 'text-slate-500' : 'text-slate-300'} flex-1 truncate">${esc(subPrd.title)}</span>
                    <div class="w-14 h-1 bg-slate-800 rounded-full overflow-hidden shrink-0">
                        <div class="${ps.bar} h-full rounded-full" style="width: ${p}%"></div>
                    </div>
                    <span class="font-mono text-[13px] text-slate-500 tabular-nums w-7 text-right shrink-0">${subPrd.stepsDone}/${subPrd.stepsTotal}</span>
                    ${hasSteps ? chevronSvg() : '<div class="w-3.5"></div>'}
                </div>
            `;

            if (!hasSteps) return `<div>${headerRow}</div>`;

            return `
                <details>
                    <summary class="hover:bg-slate-800/30 -mx-1 px-1 rounded transition-colors">
                        ${headerRow}
                    </summary>
                    <div class="ml-6 mb-1 border-l border-slate-800/40 pl-3">
                        ${subPrd.steps.map(renderStepRow).join('')}
                    </div>
                </details>
            `;
        }

        function renderSubPrdsList(subPrds, featureStatus) {
            if (!subPrds || subPrds.length === 0) return '';
            return `
                <details class="mt-1">
                    <summary class="flex items-center gap-2 py-1 hover:bg-slate-800/30 -mx-1 px-1 rounded transition-colors">
                        ${chevronSvg()}
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">${subPrds.length} Sub-PRD${subPrds.length !== 1 ? 's' : ''}</span>
                    </summary>
                    <div class="ml-1 mt-1 border-l border-slate-800/60 pl-2">
                        ${subPrds.map(renderSubPrdRow).join('')}
                    </div>
                </details>
            `;
        }

        function renderNextAction(feature) {
            if (!feature.nextAction || feature.status === 'complete') return '';
            const s = getStatus(feature.status);
            return `
                <div class="flex items-start gap-2 mt-3 pt-3 border-t border-slate-800/50">
                    <span class="${s.accent} text-sm shrink-0 mt-px">\u2192</span>
                    <span class="text-sm text-slate-300 leading-relaxed">${esc(feature.nextAction)}</span>
                </div>
            `;
        }

        function renderFeatureCard(feature, index) {
            const s = getStatus(feature.status);
            const delay = index * 0.06;
            const p = feature.progress;

            return `
                <div class="card-enter relative bg-[#0d1425] border border-slate-800/60 rounded-lg p-5 hover:border-slate-700/80 transition-colors shadow-lg shadow-black/40"
                     style="animation-delay: ${delay}s">
                    <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-l-sm" style="background: ${s.color}"></div>
                    <div class="absolute right-0 top-0 bottom-0 w-[3px] rounded-r-sm" style="background: ${s.color}"></div>

                    <!-- Header -->
                    <div class="flex items-start justify-between gap-3 mb-2">
                        <h3 class="font-mono text-base font-semibold text-white truncate">${esc(feature.name)}</h3>
                        <span class="text-[13px] font-mono font-medium px-2 py-0.5 rounded-full shrink-0 ${s.badge}">${s.label}</span>
                    </div>

                    <!-- Summary -->
                    <p class="text-sm text-slate-400 leading-relaxed mb-4 line-clamp-2">${esc(feature.summary)}</p>

                    <!-- Overall progress -->
                    <div class="mb-1">
                        ${renderProgressBar(p.stepsComplete, p.stepsTotal, feature.status, 'h-2')}
                    </div>
                    <div class="text-[13px] text-slate-600 font-mono mb-2">
                        ${p.phasesComplete}/${p.phasesTotal} phases
                    </div>

                    <!-- Phases -->
                    ${renderPhasesList(feature.phases, feature.status)}

                    <!-- Sub-PRDs -->
                    ${renderSubPrdsList(feature.subPrds, feature.status)}

                    <!-- Next action -->
                    ${renderNextAction(feature)}

                    <!-- Footer -->
                    <div class="mt-3 pt-3 border-t border-slate-800/30 flex items-center justify-between">
                        <span class="text-[13px] text-slate-600">Updated ${formatDate(feature.lastUpdated)}</span>
                        ${feature.lastCheckpoint ? `<span class="text-[13px] text-slate-600 font-mono">ckpt ${formatDate(feature.lastCheckpoint)}</span>` : ''}
                    </div>
                </div>
            `;
        }

        function renderEmptyState() {
            return `
                <div class="text-center py-20">
                    <p class="text-slate-500 text-lg font-light">No features found</p>
                    <p class="text-slate-600 text-sm mt-2">Use <span class="font-mono text-slate-500">/dev-plan</span> to start a new feature</p>
                </div>
            `;
        }

        function renderFeatureListItem(feature, index) {
            const s = getStatus(feature.status);
            const p = feature.progress;
            const progressPct = pct(p.stepsComplete, p.stepsTotal);
            const isActive = selectedFeature === feature.name;

            return `
                <li>
                    <button onclick="selectFeature('${esc(feature.name)}')"
                            data-feature="${esc(feature.name)}"
                            class="rail-item relative w-full text-left px-4 py-3 transition-all duration-150
                                   ${isActive
                                       ? 'bg-sky-500/15'
                                       : 'hover:bg-slate-800/20'}">
                        <div class="absolute left-0 top-0 bottom-0 rounded-r-sm ${isActive ? 'w-[4px]' : 'w-[3px]'}" style="background: ${s.color}"></div>
                        <div class="flex items-center gap-2.5 mb-1.5">
                            <div class="w-2 h-2 rounded-full ${s.dot} shrink-0"></div>
                            <span class="font-mono text-sm font-medium ${isActive ? 'text-white' : 'text-slate-300'} truncate flex-1">${esc(feature.name)}</span>
                            <span class="text-[12px] font-mono font-medium px-1.5 py-0.5 rounded-full shrink-0 ${s.badge}">${s.label}</span>
                        </div>
                        <div class="ml-[18px]">
                            <div class="h-1 bg-slate-800 rounded-full overflow-hidden">
                                <div class="${s.bar} h-full rounded-full transition-all duration-500" style="width: ${progressPct}%"></div>
                            </div>
                            <span class="text-[12px] text-slate-600 font-mono mt-1 block">${p.stepsComplete}/${p.stepsTotal} steps</span>
                        </div>
                    </button>
                </li>
            `;
        }

        function renderLeftPanel(features) {
            const isOverview = selectedFeature === null;
            return `
                <button id="overview-btn" onclick="selectFeature(null)"
                        class="rail-item w-full text-left px-4 py-3 transition-all duration-150
                               ${isOverview
                                   ? 'bg-sky-500/15'
                                   : 'hover:bg-slate-800/20'}">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4 ${isOverview ? 'text-sky-400' : 'text-slate-500'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                        <span class="font-sans text-sm font-medium ${isOverview ? 'text-white' : 'text-slate-400'}">Overview</span>
                        <span class="ml-auto text-[12px] font-mono text-slate-600">${features.length}</span>
                    </div>
                </button>
                <div class="h-px bg-slate-800/60 mx-3 my-1"></div>
                <nav class="overflow-y-auto flex-1">
                    <ul class="py-1">
                        ${features.map((f, i) => renderFeatureListItem(f, i)).join('')}
                    </ul>
                </nav>
            `;
        }

        function renderRightPanel(feature, allFeatures) {
            if (feature) {
                const index = allFeatures.indexOf(feature);
                return `
                    <div class="max-w-4xl slide-in">
                        ${renderFeatureCard(feature, index >= 0 ? index : 0)}
                    </div>
                `;
            }
            return allFeatures.length > 0
                ? `<div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-5">${allFeatures.map((f, i) => renderFeatureCard(f, i)).join('')}</div>`
                : renderEmptyState();
        }

        function selectFeature(name) {
            selectedFeature = (selectedFeature === name) ? null : name;
            const rightPanel = document.getElementById('right-panel');
            const leftPanel = document.getElementById('left-panel');
            const feature = selectedFeature ? sortedFeatures.find(f => f.name === selectedFeature) : null;
            rightPanel.innerHTML = renderRightPanel(feature, sortedFeatures);
            leftPanel.innerHTML = renderLeftPanel(sortedFeatures);
        }

        function renderBoard(data) {
            sortedFeatures = [...data.features].sort(
                (a, b) => (STATUS_ORDER[a.status] ?? 9) - (STATUS_ORDER[b.status] ?? 9)
            );

            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="flex h-screen overflow-hidden">
                    <!-- Left Rail -->
                    <aside class="w-64 shrink-0 border-r border-slate-800/40 bg-[#080f1e] flex flex-col h-screen">
                        <div class="px-4 py-4 border-b border-slate-800/40 shrink-0">
                            <h2 class="font-mono text-sm font-semibold text-slate-400 uppercase tracking-wider">${esc(data.projectName)}</h2>
                        </div>
                        <div id="left-panel" class="flex flex-col flex-1 overflow-hidden">
                            ${renderLeftPanel(sortedFeatures)}
                        </div>
                    </aside>

                    <!-- Right Content -->
                    <div class="flex-1 overflow-y-auto">
                        <div class="max-w-7xl mx-auto px-6 lg:px-10 py-10">
                            <!-- Header -->
                            <div class="mb-8">
                                <div class="flex items-baseline justify-between flex-wrap gap-4 mb-5">
                                    <h1 class="font-mono text-2xl font-bold text-white tracking-tight">${esc(data.projectName)}</h1>
                                    <span class="text-xs text-slate-600 font-mono">${formatTimestamp(data.generatedAt)}</span>
                                </div>
                                <div class="flex items-center gap-5 flex-wrap">
                                    ${renderSummaryStats(data.summary)}
                                </div>
                            </div>

                            <!-- Divider -->
                            <div class="h-px bg-gradient-to-r from-slate-800 via-slate-700/50 to-slate-800 mb-8"></div>

                            <!-- Feature content -->
                            <div id="right-panel">
                                ${renderRightPanel(null, sortedFeatures)}
                            </div>

                            <!-- Footer -->
                            <div class="mt-10 pt-6 border-t border-slate-800/40 text-center">
                                <p class="text-[13px] text-slate-600 font-mono">
                                    Generated ${formatTimestamp(data.generatedAt)}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        /* ── Init ── */

        document.addEventListener('DOMContentLoaded', function() {
            renderBoard(BOARD_DATA);
        });
    </script>
</body>
</html>
